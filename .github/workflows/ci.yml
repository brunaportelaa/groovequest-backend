name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generate JWT keys
        run: |
          openssl genrsa -out rsaPrivateKey.pem 2048
          openssl pkcs8 -topk8 -inform PEM -in rsaPrivateKey.pem -out src/main/resources/privateKey.pem -nocrypt
          openssl rsa -in rsaPrivateKey.pem -pubout -out src/main/resources/publicKey.pem

      - name: Run tests
        run: ./mvnw test

