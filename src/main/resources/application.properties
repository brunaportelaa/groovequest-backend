quarkus.datasource.db-kind=mysql

quarkus.datasource.username=${GROOVEQUEST_DB_USERNAME:root}
quarkus.datasource.password=${GROOVEQUEST_DB_PASSWORD:root}
quarkus.datasource.jdbc.url=${GROOVEQUEST_DB_JDBC_URL:jdbc:mysql://localhost:3308/groovequest}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${GROOVEQUEST_CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.hibernate-orm.database.generation=validate

# Run Flyway migrations automatically when the app starts.
quarkus.flyway.migrate-at-start=true

# Map camelCase Java fields to snake_case DB columns (durationMinutes -> duration_minutes).
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.hibernate-orm.log.sql=true