quarkus.datasource.db-kind=mysql

%dev.quarkus.datasource.username=${GROOVEQUEST_DB_USERNAME:root}
%dev.quarkus.datasource.password=${GROOVEQUEST_DB_PASSWORD:root}
%dev.quarkus.datasource.jdbc.url=${GROOVEQUEST_DB_JDBC_URL:jdbc:mysql://localhost:3308/groovequest}

%prod.quarkus.datasource.username=${GROOVEQUEST_DB_USERNAME}
%prod.quarkus.datasource.password=${GROOVEQUEST_DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${GROOVEQUEST_DB_JDBC_URL}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${GROOVEQUEST_CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=true

# Run Flyway migrations automatically when the app starts.
quarkus.flyway.migrate-at-start=true

# Map camelCase Java fields to snake_case DB columns (durationMinutes -> duration_minutes).
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- JWT ---
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://groovequest.dev/issuer

# Security: any JAX-RS endpoint WITHOUT a security annotation is denied (401).
quarkus.security.jaxrs.deny-unannotated-endpoints=true
# Keep Swagger UI available outside dev too (handy for a portfolio demo).
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.auto-add-security=false